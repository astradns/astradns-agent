apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: astradns-agent
  namespace: astradns-operator-system
  labels:
    app.kubernetes.io/name: astradns-agent
    app.kubernetes.io/component: data-plane
    app.kubernetes.io/part-of: astradns
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: astradns-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astradns-agent
        app.kubernetes.io/component: data-plane
    spec:
      serviceAccountName: astradns-agent
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent
        image: astradns/agent:latest
        ports:
        - containerPort: 5353
          hostPort: 5353
          name: dns
          protocol: UDP
        - containerPort: 5353
          hostPort: 5353
          name: dns-tcp
          protocol: TCP
        - containerPort: 9153
          name: metrics
          protocol: TCP
        - containerPort: 8080
          name: health
          protocol: TCP
        env:
        - name: ASTRADNS_ENGINE_TYPE
          value: "unbound"
        - name: ASTRADNS_LISTEN_ADDR
          value: "0.0.0.0:5353"
        - name: ASTRADNS_CONFIG_PATH
          value: "/etc/astradns/config/config.json"
        - name: ASTRADNS_ENGINE_CONFIG_DIR
          value: "/var/run/astradns/engine"
        - name: ASTRADNS_PROXY_TIMEOUT
          value: "2s"
        - name: ASTRADNS_HEALTH_PROBE_DOMAIN
          value: "."
        - name: ASTRADNS_HEALTH_PROBE_TYPE
          value: "NS"
        - name: ASTRADNS_PROXY_RATE_LIMIT_GLOBAL_RPS
          value: "2000"
        - name: ASTRADNS_PROXY_RATE_LIMIT_GLOBAL_BURST
          value: "4000"
        - name: ASTRADNS_PROXY_RATE_LIMIT_PER_SOURCE_RPS
          value: "200"
        - name: ASTRADNS_PROXY_RATE_LIMIT_PER_SOURCE_BURST
          value: "400"
        - name: ASTRADNS_PROXY_RATE_LIMIT_PER_SOURCE_STATE_TTL
          value: "5m"
        - name: ASTRADNS_PROXY_RATE_LIMIT_PER_SOURCE_MAX_SOURCES
          value: "10000"
        - name: ASTRADNS_PROXY_CACHE_MAX_ENTRIES
          value: "10000"
        - name: ASTRADNS_PROXY_CACHE_DEFAULT_TTL
          value: "30s"
        - name: ASTRADNS_ENGINE_CONN_POOL_SIZE
          value: "64"
        - name: ASTRADNS_CONFIG_WATCH_DEBOUNCE
          value: "1s"
        - name: ASTRADNS_ENGINE_RECOVERY_INTERVAL
          value: "5s"
        - name: ASTRADNS_COMPONENT_ERROR_BUFFER
          value: "5"
        - name: ASTRADNS_DIAGNOSTICS_ENABLED
          value: "false"
        - name: ASTRADNS_DIAGNOSTICS_TARGETS
          value: ""
        - name: ASTRADNS_DIAGNOSTICS_INTERVAL
          value: "1m"
        - name: ASTRADNS_DIAGNOSTICS_TIMEOUT
          value: "3s"
        - name: ASTRADNS_TRACING_ENABLED
          value: "false"
        - name: ASTRADNS_TRACING_ENDPOINT
          value: "localhost:4318"
        - name: ASTRADNS_TRACING_INSECURE
          value: "true"
        - name: ASTRADNS_TRACING_SAMPLE_RATIO
          value: "0.1"
        - name: ASTRADNS_TRACING_SERVICE_NAME
          value: "astradns-agent"
        - name: ASTRADNS_LOG_MODE
          value: "sampled"
        - name: ASTRADNS_LOG_SAMPLE_RATE
          value: "0.1"
        volumeMounts:
        - name: config
          mountPath: /etc/astradns/config
          readOnly: true
        - name: engine-config
          mountPath: /var/run/astradns/engine
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      volumes:
      - name: config
        configMap:
          name: astradns-agent-config
      - name: engine-config
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: false
metadata:
  name: astradns-agent
  namespace: astradns-operator-system
---
apiVersion: v1
kind: Service
metadata:
  name: astradns-agent-metrics
  namespace: astradns-operator-system
  labels:
    app.kubernetes.io/name: astradns-agent
spec:
  selector:
    app.kubernetes.io/name: astradns-agent
  ports:
  - name: metrics
    port: 9153
    targetPort: metrics
    protocol: TCP
