name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          semver_regex='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "${RELEASE_TAG}" =~ ${semver_regex} ]]; then
            echo "invalid semver tag: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Test and vet
        run: |
          make test
          make vet

      - name: Build agent binary
        run: make build

      - name: Package release artifacts
        run: |
          mkdir -p dist
          cp bin/astradns-agent dist/astradns-agent-linux-amd64
          sha256sum dist/astradns-agent-linux-amd64 > dist/astradns-agent-linux-amd64.sha256

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag

      - name: Build and push image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export image digest
        run: |
          echo "${{ steps.build-image.outputs.digest }}" > dist/container-digest.txt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: astradns-agent-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/astradns-agent-linux-amd64
            dist/astradns-agent-linux-amd64.sha256
            dist/container-digest.txt
