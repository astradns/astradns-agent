name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build
        run: make build

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -tags=integration ./test/integration/...

  e2e-kind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --name astradns-agent-e2e --wait 120s

      - name: E2E tests
        run: go test -tags=e2e ./test/e2e/...

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name astradns-agent-e2e

  security-gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gosec scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -no-fail -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

  security-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            aquasec/trivy:0.63.0 \
            fs \
            --format sarif \
            --output trivy.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            .

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
